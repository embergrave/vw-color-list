<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>MWL Color Grid</title>
	<style>
		:root {
			--gap: 5px;
			--bg: #000000;
			--text: #ffffff;
			--circle-size: 100px;
			--base-label-size: calc(var(--circle-size) * 0.11);
			--panel-height: calc(100vh - 120px);
			--spawn-label-height: 26px;
		}

		* {
			box-sizing: border-box;
			scrollbar-width: thin;
			scrollbar-color: #3a3a3a #111111;
		}

		*::-webkit-scrollbar {
			width: 10px;
			height: 10px;
		}

		*::-webkit-scrollbar-track {
			background: #111111;
		}

		*::-webkit-scrollbar-thumb {
			background: #3a3a3a;
			border-radius: 8px;
			border: 2px solid #111111;
		}

		*::-webkit-scrollbar-thumb:hover {
			background: #4a4a4a;
		}

		body {
			margin: 0;
			padding: 20px;
			font-family: Consolas, "Courier New", monospace;
			background: var(--bg);
			color: var(--text);
			display: flex;
			justify-content: center;
			height: 100vh;
			overflow: hidden;
		}

		.page {
			width: 100%;
			max-width: 1700px;
			display: flex;
			flex-direction: column;
			align-items: center;
			padding-top: 20px;
			max-height: calc(100vh - 40px);
			overflow-y: auto;
			padding-bottom: 20px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 1.3rem;
			font-weight: 700;
			color: #ffffff;
			text-align: center;
		}

		.meta {
			margin: 0 0 16px;
			font-size: 0.9rem;
			opacity: 0.85;
			color: #ffffff;
			text-align: center;
		}

		.footer {
			margin-top: 22px;
			font-size: 0.85rem;
			opacity: 0.85;
			text-align: center;
		}

		.controls {
			margin: 0 0 10px;
			color: #ffffff;
			font-size: 0.9rem;
			display: flex;
			flex-direction: column;
			align-items: stretch;
			justify-content: flex-start;
			gap: 10px;
			width: 100%;
		}

		.control-group {
			display: flex;
			flex-direction: column;
			gap: 6px;
			width: 100%;
		}

		.control-group label {
			font-size: 0.9rem;
			font-weight: 700;
			color: #ffffff;
		}

		.filter-select {
			min-width: 0;
			width: 100%;
			height: 110px;
			background: #0f0f0f;
			color: #ffffff;
			border: 1px solid #3a3a3a;
			font-family: Consolas, "Courier New", monospace;
			font-size: 0.85rem;
			padding: 4px;
		}

		.action-buttons {
			display: flex;
			flex-direction: column;
			gap: 8px;
		}

		.action-buttons button {
			background: #1a1a1a;
			color: #ffffff;
			border: 1px solid #3a3a3a;
			font-family: Consolas, "Courier New", monospace;
			font-size: 0.85rem;
			padding: 6px 10px;
			cursor: pointer;
		}

		.info-group {
			min-width: 0;
		}

		.info-inline {
			display: flex;
			align-items: center;
			justify-content: center;
			gap: 14px;
			margin: 0;
			width: 100%;
			font-size: clamp(0.62rem, 1.2vw, 0.82rem);
			line-height: 1.35;
			color: #ffffff;
			white-space: nowrap;
			flex-wrap: nowrap;
		}

		.config-output {
			width: 320px;
			min-width: 320px;
			max-width: 320px;
			background: #111111;
			border: 1px solid #2f2f2f;
			padding: 10px;
			margin: 0;
			display: flex;
			flex-direction: column;
			height: var(--panel-height);
		}

		.content-layout {
			width: fit-content;
			max-width: 100%;
			display: flex;
			justify-content: center;
			align-items: flex-start;
            gap: 25px;
		}

		.right-panel {
			display: flex;
			flex-direction: column;
			align-items: center;
			width: 760px;
			min-width: 760px;
			max-width: 760px;
		}

		@media (max-width: 1200px) {
			.content-layout {
				flex-direction: column;
				align-items: center;
			}

			.config-output,
			.right-panel {
				width: min(100%, 980px);
				min-width: 0;
				max-width: 980px;
			}
		}

		.config-header {
			display: flex;
			justify-content: space-between;
			align-items: center;
			gap: 10px;
			margin-bottom: 8px;
		}

		.config-title {
			font-size: 0.9rem;
			font-weight: 700;
			color: #ffffff;
		}

		.config-copy {
			background: #1a1a1a;
			color: #ffffff;
			border: 1px solid #3a3a3a;
			font-family: Consolas, "Courier New", monospace;
			font-size: 0.8rem;
			padding: 5px 10px;
			cursor: pointer;
		}

		#configCode {
			display: block;
			white-space: pre;
			overflow: auto;
			max-height: none;
			flex: 1;
			margin: 0;
			font-family: Consolas, "Courier New", monospace;
			font-size: 0.85rem;
			line-height: 1.3;
			color: #d8ffd8;
		}

		.circles-scroll {
			width: 100%;
			height: var(--panel-height);
			max-height: var(--panel-height);
			overflow: auto;
			display: flex;
			justify-content: center;
		}

		#grid {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(var(--circle-size), 1fr));
			gap: var(--gap);
			width: min(100%, calc(var(--circle-size) * 7 + var(--gap) * 6));
			justify-items: center;
			align-content: start;
		}

		body.spawn-mode {
			--circle-size: 2px;
		}

		body.spawn-mode #grid {
			display: flex;
			flex-direction: column;
			gap: 36px;
			width: 100%;
			padding: 0 12px;
			align-items: start;
		}

		body.spawn-mode .spawn-section {
			display: grid;
			grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
			gap: 24px;
			width: 100%;
		}

		@media (max-width: 900px) {
			body.spawn-mode .spawn-section {
				grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
			}
		}

		@media (max-width: 620px) {
			body.spawn-mode .spawn-section {
				grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
			}
		}

		.category-group {
			display: flex;
			flex-direction: column;
			gap: 6px;
			align-items: center;
		}

		body.spawn-mode .category-group {
			display: flex;
			width: 100%;
			margin: 0;
		}

		body.spawn-mode .category-title {
			padding: 8px 0 6px;
			text-align: center;
		}

		.category-title {
			font-size: 0.85rem;
			font-weight: 700;
			color: #ffffff;
			text-transform: uppercase;
		}

		.category-swatches {
			display: grid;
			grid-template-columns: repeat(7, var(--circle-size));
			gap: var(--gap);
			justify-content: center;
		}

		.item {
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: flex-start;
			gap: 0;
		}

		.swatch {
			width: var(--circle-size);
			height: calc(var(--circle-size) * 0.464);
			border-radius: 6px;
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			border: none;
			box-shadow: none;
			cursor: pointer;
		}

		.text-block {
			width: 100%;
			display: flex;
			flex-direction: column;
			align-items: center;
			justify-content: center;
			text-align: center;
			line-height: 1.2;
			word-break: break-word;
			overflow-wrap: anywhere;
		}

		body.spawn-mode .swatch {
			width: var(--circle-size);
			height: var(--circle-size);
			border-radius: 50%;
			clip-path: none;
			image-rendering: pixelated;
		}

		.name,
		.hex,
		.category {
			font-family: Consolas, "Courier New", monospace;
			color: inherit;
			line-height: 1.02;
		}

		.name {
			font-size: var(--base-label-size);
			font-weight: 700;
			white-space: nowrap;
			width: 100%;
			overflow: hidden;
		}

		.hex {
			font-size: calc(var(--base-label-size) * 1.25);
			font-weight: 700;
			padding: 0;
		}

		.category {
			font-size: calc(var(--base-label-size) * 0.75);
			font-weight: 700;
		}

		body.spawn-mode .text-block {
			display: none;
		}

		body.spawn-mode .category-swatches {
			gap: 25px;
		}

		body.spawn-mode .category-labels {
			display: grid;
			grid-template-columns: repeat(7, minmax(0, 1fr));
			gap: 4px;
			justify-content: center;
			width: 100%;
		}

		body.spawn-mode .label-item {
			display: flex;
			align-items: center;
			justify-content: center;
			text-align: center;
			min-height: var(--spawn-label-height);
			font-size: 0.7rem;
			font-weight: 700;
			line-height: 1.1;
			padding: 2px 4px;
			border: 1px solid #222222;
			background: #0d0d0d;
			color: #ffffff;
			word-break: break-word;
			overflow-wrap: anywhere;
		}
	</style>
</head>
<body>
	<div class="page">
	<div class="content-layout">
		<div id="configOutput" class="config-output">
			<div class="controls">
				<h1>BC Location Color Sheet</h1>
				<div class="control-group">
					<select id="categoryFilter" class="filter-select" multiple></select>
				</div>
				<div class="control-group">
					<select id="modFilter" class="filter-select" multiple></select>
				</div>
				<div class="control-group action-buttons">
					<button id="selectAllFilters" type="button">SELECT ALL</button>
					<button id="clearAllFilters" type="button">CLEAR ALL</button>
					<button id="spawnMapModeToggle" type="button" aria-pressed="false">SPAWN MAP: OFF</button>
				</div>
				<div class="control-group info-group">
					<div class="info-inline">
						<span id="infoShowing">Showing 0 / 0</span>
						<span id="infoMode">Mode: Normal</span>
					</div>
				</div>
			</div>
			<div class="config-header">
				<div class="config-title">GENERATED CONFIG</div>
				<button id="copyConfigButton" class="config-copy" type="button">COPY CONFIG</button>
			</div>
			<code id="configCode"></code>
		</div>
		<div class="right-panel">
			<div class="circles-scroll">
				<div id="grid"></div>
			</div>
		</div>
	</div>
	<div class="footer">Made by Konjirmos</div>
	</div>

			},
			Mountains: {

				MWL_RuinsChurch2: 15, MWL_StoneAltar1: 15, MWL_StoneCastle1: 5, MWL_StoneFort1: 10, MWL_StoneHall1: 10,
				MWL_StoneTavern1: 10, MWL_StoneTower1: 10, MWL_StoneTower2: 10, MWL_TempleShrine1: 5, MWL_WoodBarn1: 10,

			},

				MWL_DvergrKnowledgeExtractor1: 15, MWL_MarbleCage1: 10, MWL_MarbleCliffAltar1: 10, MWL_MarbleHome1: 10, MWL_MarbleHome2: 10,
				MWL_MarbleJail1: 10, MWL_MistFort2: 20, MWL_MistHut1: 25, MWL_Misthut2: 15, MWL_MistPond1: 10,
				MWL_MistShrine1: 15, MWL_MistTower1: 20, MWL_MistTower2: 25, MWL_MistWall1: 15, MWL_MistWorkshop1: 25,

			},
			Traders: {

			},

			}

		const vanillaByCategory = {

			],

				"AbandonedLogCabin03", "AbandonedLogCabin04", "MountainCave02", "StoneTowerRuins04", "StoneTowerRuins05", "DrakeLorestone", "Runestone_Mountains"
			],
			Mistlands: [

		Object.entries(vanillaByCategory).forEach(([category, ids]) => {
			ids.forEach((id, index) => {
				mwlByCategory[category][id] = index + 1;
			});
		});

		const hueRanges = {
			Meadows: [88, 148],
			BlackForest: [150, 210],
			Swamp: [100, 170],
			Mountains: [200, 255],
			Plains: [28, 70],
			Mistlands: [255, 315],
			Ashlands: [0, 20],
			Ports: [186, 236],
			Traders: [42, 92],
			Trainers: [320, 360]
		};

		const groupedEntries = Object.entries(mwlByCategory).flatMap(([category, items]) => {
			const sorted = Object.entries(items)
				.map(([id, weight]) => ({ id, weight }))
				.sort((a, b) => a.weight - b.weight || a.id.localeCompare(b.id));

			return sorted.map((entry, localIndex) => ({
				category,
				id: entry.id,
				weight: entry.weight,
				localIndex,
				label: entry.id.replace(/^MWL_/, "")
			}));
		});

		function hslToRgb(h, s, l) {
			const sat = s / 100;
			const light = l / 100;
			const c = (1 - Math.abs(2 * light - 1)) * sat;
			const hh = h / 60;
			const x = c * (1 - Math.abs((hh % 2) - 1));
			let r1 = 0, g1 = 0, b1 = 0;

			if (hh >= 0 && hh < 1) [r1, g1, b1] = [c, x, 0];
			else if (hh < 2) [r1, g1, b1] = [x, c, 0];
			else if (hh < 3) [r1, g1, b1] = [0, c, x];
			else if (hh < 4) [r1, g1, b1] = [0, x, c];
			else if (hh < 5) [r1, g1, b1] = [x, 0, c];
			else [r1, g1, b1] = [c, 0, x];

			const m = light - c / 2;
			const r = Math.round((r1 + m) * 255);
			const g = Math.round((g1 + m) * 255);
			const b = Math.round((b1 + m) * 255);
			return [r, g, b];
		}

		function generateColor(category, index) {
			const [minHue, maxHue] = hueRanges[category] ?? [0, 360];
			const span = maxHue >= minHue ? (maxHue - minHue) : (360 - minHue + maxHue);
			const phi = 0.61803398875;
			const offset = ((index * phi) % 1 + (index % 7) * 0.03) % 1;
			const hue = (minHue + offset * span + 360) % 360;
			const saturation = 82 + (index % 4) * 5;
			const lightness = 40 + ((index * 3) % 5) * 8;
			return { hue, saturation: Math.min(saturation, 98), lightness: Math.min(lightness, 74) };
		}

		function toHex(r, g, b) {
			return "#" + [r, g, b].map((value) => value.toString(16).padStart(2, "0")).join("");
		}

		function toRgbString(r, g, b) {
			return `${r},${g},${b}`;
		}

		function getContrastTextColor(r, g, b) {
			const [rr, gg, bb] = [r, g, b].map((value) => {
				const s = value / 255;
				return s <= 0.03928 ? s / 12.92 : Math.pow((s + 0.055) / 1.055, 2.4);
			});
			const luminance = 0.2126 * rr + 0.7152 * gg + 0.0722 * bb;
			return luminance > 0.5 ? "#000000" : "#ffffff";
		}

		function getNameScale(label) {
			const baselineChars = 12;
			const scale = baselineChars / Math.max(label.length, baselineChars);
			return Math.max(0.45, Math.min(1, scale));
		}

		const grid = document.getElementById("grid");
		const spawnMapModeToggle = document.getElementById("spawnMapModeToggle");
		const categoryFilter = document.getElementById("categoryFilter");
		const modFilter = document.getElementById("modFilter");
		const selectAllFilters = document.getElementById("selectAllFilters");
		const clearAllFilters = document.getElementById("clearAllFilters");
		const configOutput = document.getElementById("configOutput");
		const configCode = document.getElementById("configCode");
		const copyConfigButton = document.getElementById("copyConfigButton");
		const infoShowing = document.getElementById("infoShowing");
		const infoMode = document.getElementById("infoMode");
		let isSpawnMapMode = false;

		const allCategories = Object.keys(mwlByCategory);
		const allMods = ["Vanilla", "More World Locations"];

		groupedEntries.forEach((entry) => {
			entry.mod = entry.id.startsWith("MWL_") ? "More World Locations" : "Vanilla";
		});

		function getEntryRgb(entry) {
			if (entry.id === "StartTemple") {
				return [255, 0, 0];
			}

			const color = generateColor(entry.category, entry.localIndex);
			return hslToRgb(color.hue, color.saturation, color.lightness);
		}

		function fillMultiSelect(selectElement, values) {
			values.forEach((value) => {
				const option = document.createElement("option");
				option.value = value;
				option.textContent = value;
				option.selected = true;
				selectElement.appendChild(option);
			});
		}

		function getSelectedValues(selectElement) {
			return Array.from(selectElement.selectedOptions).map((option) => option.value);
		}

		function getVisibleEntries() {
			const selectedCategories = new Set(getSelectedValues(categoryFilter));
			const selectedMods = new Set(getSelectedValues(modFilter));
			return groupedEntries.filter((entry) =>
				selectedCategories.has(entry.category) && selectedMods.has(entry.mod)
			);
		}

		function buildConfigText(visibleEntries) {
			if (visibleEntries.length === 0) {
				return "# No entries selected";
			}

			const lines = [];
			visibleEntries.forEach((entry) => {
				const [r, g, b] = getEntryRgb(entry);
				lines.push(`${entry.id}: ${toRgbString(r, g, b)}`);
			});

			return lines.join("\n").trimEnd();
		}

		function updateInfo(visibleCount) {
			infoShowing.textContent = `Showing ${visibleCount} / ${groupedEntries.length}`;
			infoMode.textContent = `Mode: ${isSpawnMapMode ? "Spawn Map" : "Normal"}`;
		}

		fillMultiSelect(categoryFilter, allCategories);
		fillMultiSelect(modFilter, allMods);

		spawnMapModeToggle.addEventListener("click", () => {
			isSpawnMapMode = !isSpawnMapMode;
			document.body.classList.toggle("spawn-mode", isSpawnMapMode);
			spawnMapModeToggle.setAttribute("aria-pressed", isSpawnMapMode ? "true" : "false");
			spawnMapModeToggle.textContent = isSpawnMapMode ? "SPAWN MAP: ON" : "SPAWN MAP: OFF";
			renderGrid();
		});

		categoryFilter.addEventListener("change", renderGrid);
		modFilter.addEventListener("change", renderGrid);

		selectAllFilters.addEventListener("click", () => {
			Array.from(categoryFilter.options).forEach((option) => {
				option.selected = true;
			});
			Array.from(modFilter.options).forEach((option) => {
				option.selected = true;
			});
			renderGrid();
		});

		clearAllFilters.addEventListener("click", () => {
			Array.from(categoryFilter.options).forEach((option) => {
				option.selected = false;
			});
			Array.from(modFilter.options).forEach((option) => {
				option.selected = false;
			});
			renderGrid();
		});

		copyConfigButton.addEventListener("click", async () => {
			const configText = configCode.textContent || "";
			try {
				await navigator.clipboard.writeText(configText);
			} catch {
			}
			updateInfo(getVisibleEntries().length);
		});

		function renderGrid() {
			const selectedCategories = new Set(getSelectedValues(categoryFilter));
			const selectedMods = new Set(getSelectedValues(modFilter));
			grid.innerHTML = "";
			const visibleEntries = getVisibleEntries();

			const renderItem = (entry) => {
				const color = generateColor(entry.category, entry.localIndex);
				const [r, g, b] = getEntryRgb(entry);
				const rgbValue = toRgbString(r, g, b);

				const item = document.createElement("div");
				item.className = "item";

				const swatch = document.createElement("div");
				swatch.className = "swatch";
				swatch.style.backgroundColor = entry.id === "StartTemple"
					? "rgb(255 0 0)"
					: `hsl(${color.hue.toFixed(1)} ${color.saturation}% ${color.lightness}%)`;
				swatch.style.color = getContrastTextColor(r, g, b);
				swatch.title = `${entry.category} • ${entry.id} • ${entry.weight} • ${entry.mod} • ${rgbValue}`;

				const content = document.createElement("div");
				content.className = "text-block";

				const nameLine = document.createElement("div");
				nameLine.className = "name";
				nameLine.style.fontSize = `calc(var(--base-label-size) * ${getNameScale(entry.label)})`;
				nameLine.textContent = entry.label;

				const hexLine = document.createElement("div");
				hexLine.className = "hex";
				hexLine.textContent = rgbValue;

				const categoryLine = document.createElement("div");
				categoryLine.className = "category";
				categoryLine.textContent = entry.category.toUpperCase();

				content.appendChild(nameLine);
				content.appendChild(hexLine);
				content.appendChild(categoryLine);
				swatch.appendChild(content);
				item.appendChild(swatch);
				swatch.addEventListener("click", async () => {
					try {
						await navigator.clipboard.writeText(rgbValue);
					} catch {
					}
					updateInfo(visibleEntries.length);
				});

				return item;
			};

			if (isSpawnMapMode) {
				const topSection = document.createElement("div");
				topSection.className = "spawn-section";

				const bottomSection = document.createElement("div");
				bottomSection.className = "spawn-section";

				allCategories.forEach((categoryName) => {
					if (!selectedCategories.has(categoryName)) {
						return;
					}

					const categoryEntries = visibleEntries.filter((entry) => entry.category === categoryName);
					if (categoryEntries.length === 0) {
						return;
					}

					const swatchContainer = document.createElement("div");
					swatchContainer.className = "category-swatches";

					const labelContainer = document.createElement("div");
					labelContainer.className = "category-labels";

					categoryEntries.forEach((entry) => {
						swatchContainer.appendChild(renderItem(entry));
						const labelItem = document.createElement("div");
						labelItem.className = "label-item";
						labelItem.textContent = entry.label;
						labelItem.title = entry.id;
						labelContainer.appendChild(labelItem);
					});

					const topGroup = document.createElement("div");
					topGroup.className = "category-group";
					topGroup.appendChild(swatchContainer);
					topSection.appendChild(topGroup);

					const bottomGroup = document.createElement("div");
					bottomGroup.className = "category-group";
					const bottomTitle = document.createElement("div");
					bottomTitle.className = "category-title";
					bottomTitle.textContent = categoryName;
					bottomGroup.appendChild(bottomTitle);
					bottomGroup.appendChild(labelContainer);
					bottomSection.appendChild(bottomGroup);
				});

				grid.appendChild(topSection);
				grid.appendChild(bottomSection);
			} else {
				visibleEntries.forEach((entry) => {
					grid.appendChild(renderItem(entry));
				});
			}

			updateInfo(visibleEntries.length);
			configCode.textContent = buildConfigText(visibleEntries);
		}

		renderGrid();
	</script>
</body>
